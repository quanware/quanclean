name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
            args: ""
          - platform: macos-x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: macos-aarch64
            os: macos-latest
            args: "--target aarch64-apple-darwin"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-aarch64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x86_64' && 'x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install

      - name: Generate icons
        run: pnpm gen-icons

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — set these secrets to enable)
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuanClean ${{ github.ref_name }}"
          releaseBody: |
            ## QuanClean ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.msi` or `.exe` installer |
            | macOS (Intel) | `.dmg` |
            | macOS (Apple Silicon) | `.dmg` |

            See the assets below.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  # ── CLI binaries ─────────────────────────────────────────────────────────────
  cli:
    name: CLI binary (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            os: windows-latest
            binary: quanclean.exe
            archive: quanclean-windows-x86_64.zip
          - platform: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: quanclean
            archive: quanclean-macos-x86_64.tar.gz
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: quanclean
            archive: quanclean-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.platform }}

      - name: Build CLI (Windows)
        if: matrix.platform == 'windows-x86_64'
        run: cargo build -p quanclean-cli --release

      - name: Build CLI (macOS)
        if: startsWith(matrix.platform, 'macos-')
        run: cargo build -p quanclean-cli --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/release/${{ matrix.binary }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Package (macOS)
        if: startsWith(matrix.platform, 'macos-')
        run: |
          tar -czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ matrix.archive }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
